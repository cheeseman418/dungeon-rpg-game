<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダンジョン討伐RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
      --glass-bg: rgba(15, 23, 42, 0.85);
      --primary-color: #3b82f6;
      --accent-color: #f43f5e;
      --gold-color: #fbbf24;
      --gem-color: #06b6d4;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      padding-bottom: 150px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 32px;
      background: linear-gradient(135deg, var(--gold-color), var(--gem-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.08);
      padding: 8px 15px;
      border-radius: 8px;
      font-size: 13px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      font-size: 14px;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .battle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .enemy-emoji {
      font-size: 48px;
      text-align: center;
      margin-bottom: 10px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .health-bar {
      width: 100%;
      height: 18px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #34d399);
      transition: width 0.3s;
    }

    .hp-text {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }

    .card-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--gold-color);
    }

    .enhance-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 15px;
    }

    .enhance-btn {
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 11px;
      transition: 0.3s;
    }

    .enhance-btn:hover {
      transform: scale(1.05);
    }

    .gacha-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .gacha-btn {
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 11px;
      transition: 0.3s;
    }

    .gacha-btn:hover {
      transform: scale(1.05);
    }

    .party-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      margin-bottom: 15px;
    }

    .party-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 8px;
      border-radius: 10px;
      text-align: center;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .party-img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      margin: 0 auto 5px;
      display: block;
      image-rendering: pixelated;
    }

    .party-name {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .party-level {
      font-size: 10px;
      color: var(--text-secondary);
    }

    /* モーダル */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      background: var(--glass-bg);
      border-radius: 15px;
      padding: 25px;
      max-width: 450px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 15px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }

    .modal-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* 動画演出 */
    #videoContainer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }

    #videoContainer.show {
      display: flex;
    }

    #gachaVideo {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 15px;
    }

    /* 広告 */
    .banner-ad {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(15, 23, 42, 0.95);
      padding: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
    }

    .ad-mobile { display: none; width: 100%; max-width: 320px; }
    .ad-pc { display: none; width: 100%; max-width: 728px; }

    @media (max-width: 768px) {
      .ad-mobile { display: block; }
      .battle-grid { grid-template-columns: 1fr; }
      .enhance-grid { grid-template-columns: repeat(2, 1fr); }
      body { padding-bottom: 80px; }
      h1 { font-size: 24px; }
    }

    @media (min-width: 769px) {
      .ad-pc { display: block; }
      body { padding-bottom: 110px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚔️ ダンジョン討伐RPG</h1>
      <div class="stats">
        <div class="stat">💰 <span id="gold">0</span>G</div>
        <div class="stat">💎 <span id="gems">0</span></div>
        <div class="stat">🏆 <span id="stage">1</span>F</div>
        <div class="stat">📈 Lv<span id="level">1</span></div>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(0)">⚔️ バトル</button>
      <button class="tab-btn" onclick="switchTab(1)">⚙️ 強化</button>
      <button class="tab-btn" onclick="switchTab(2)">🎰 ガチャ</button>
    </div>

    <!-- バトルタブ -->
    <div class="tab-content active">
      <div class="battle-grid">
        <div class="panel">
          <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 10px;">敵</div>
          <div class="enemy-emoji" id="enemyEmoji">👹</div>
          <div style="font-size: 11px; color: var(--text-secondary); text-align: center; margin-bottom: 8px;" id="enemyName">敵 Lv1</div>
          <div class="health-bar">
            <div class="health-fill" id="enemyHp" style="width: 100%;"></div>
          </div>
          <div class="hp-text"><span id="enemyHpText">100</span>/<span id="enemyMaxHpText">100</span></div>
        </div>

        <div class="panel">
          <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 10px;">プレイヤー</div>
          <div class="enemy-emoji">⚔️</div>
          <div style="font-size: 11px; color: var(--text-secondary); text-align: center; margin-bottom: 8px;">HP</div>
          <div class="health-bar">
            <div class="health-fill" id="playerHp" style="width: 100%; background: linear-gradient(90deg, #f43f5e, #fb7185);"></div>
          </div>
          <div class="hp-text"><span id="playerHpText">100</span>/<span id="playerMaxHpText">100</span></div>
        </div>
      </div>

      <div class="button-row">
        <button class="btn" onclick="attack()">🗡️ 攻撃</button>
        <button class="btn" onclick="skill()">✨ スキル</button>
        <button class="btn" onclick="defend()">🛡️ 防御</button>
      </div>

      <div class="info-grid">
        <div class="info-card">
          <div class="card-label">ダメージ</div>
          <div class="card-value" id="damage">0</div>
        </div>
        <div class="info-card">
          <div class="card-label">獲得G</div>
          <div class="card-value" id="reward">0</div>
        </div>
      </div>

      <div class="party-grid" id="partyDisplay"></div>
    </div>

    <!-- 強化タブ -->
    <div class="tab-content">
      <div class="enhance-grid">
        <div class="panel" style="text-align: center;">
          <div class="card-label">攻撃力</div>
          <div class="card-value" id="atkLv">1.0x</div>
          <button class="enhance-btn" onclick="upgradeAtk()">強化</button>
        </div>
        <div class="panel" style="text-align: center;">
          <div class="card-label">防御力</div>
          <div class="card-value" id="defLv">0.0x</div>
          <button class="enhance-btn" onclick="upgradeDef()">強化</button>
        </div>
        <div class="panel" style="text-align: center;">
          <div class="card-label">最大HP</div>
          <div class="card-value" id="hpLv">100</div>
          <button class="enhance-btn" onclick="upgradeHp()">強化</button>
        </div>
        <div class="panel" style="text-align: center;">
          <div class="card-label">武器</div>
          <button class="enhance-btn" onclick="openMenu('weapon')" style="width: 100%; padding: 10px;">管理</button>
        </div>
        <div class="panel" style="text-align: center;">
          <div class="card-label">ペット</div>
          <div class="card-value" id="petCnt">0</div>
          <button class="enhance-btn" onclick="buyPet()">購入</button>
        </div>
        <div class="panel" style="text-align: center;">
          <div class="card-label">ギルド</div>
          <div class="card-value" id="guildLv">1</div>
          <button class="enhance-btn" onclick="upgradeGuild()">UP</button>
        </div>
      </div>

      <button class="btn" style="width: 100%; margin-top: 15px; padding: 12px;" onclick="prestige()">✨ 転生</button>
    </div>

    <!-- ガチャタブ -->
    <div class="tab-content">
      <div class="panel" style="margin-bottom: 15px;">
        <div class="card-label" style="margin-bottom: 10px;">武器ガチャ</div>
        <div class="gacha-buttons">
          <button class="gacha-btn" onclick="gachaWeapon(1)">1回</button>
          <button class="gacha-btn" onclick="gachaWeapon(3)">3回</button>
          <button class="gacha-btn" onclick="gachaWeapon(10)">10回</button>
        </div>
      </div>

      <div class="panel" style="margin-bottom: 15px;">
        <div class="card-label" style="margin-bottom: 10px;">仲間ガチャ</div>
        <div class="gacha-buttons">
          <button class="gacha-btn" onclick="gachaHero(1)">1回</button>
          <button class="gacha-btn" onclick="gachaHero(3)">3回</button>
          <button class="gacha-btn" onclick="gachaHero(10)">10回</button>
        </div>
      </div>

      <button class="btn" style="width: 100%; padding: 12px; margin-bottom: 15px;" onclick="watchAd()">📺 広告を見る</button>

      <div class="party-grid" id="gachaPartyDisplay"></div>
    </div>
  </div>

  <!-- 動画演出 -->
  <div id="videoContainer">
    <video id="gachaVideo" muted playsinline style="max-width: 90%; max-height: 90%;"></video>
  </div>

  <!-- メニューモーダル -->
  <div class="modal" id="menuModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeMenu()">✕</button>
      <div class="modal-title" id="menuTitle">メニュー</div>
      <div id="menuContent"></div>
    </div>
  </div>

  <!-- 広告バナー -->
  <div class="banner-ad">
    <div class="ad-mobile">
      <script src="https://adm.shinobi.jp/s/238e85d72e7749383cf9c35b230c7584"></script>
    </div>
    <div class="ad-pc">
      <script src="https://adm.shinobi.jp/s/264d330811e8cbfd41d7281d4c408fbf"></script>
    </div>
  </div>

  <script>
    // ゲーム状態
    const game = {
      gold: 100,
      gems: 50,
      level: 1,
      stage: 1,
      maxStage: 1,
      atk: 1,
      def: 0,
      hp: 1,
      maxHp: 100,
      currentHp: 100,
      pet: 0,
      guild: 1,
      prestige: 0,
      heroes: {},
      weapons: [],
      defending: false
    };

    let enemy = null;

    // 敵生成
    function spawnEnemy() {
      const emojis = ['👹', '🧛', '👻', '🐉', '🗿'];
      const e = emojis[Math.floor(Math.random() * emojis.length)];
      const baseHp = 50 + game.stage * 20;
      enemy = {
        emoji: e,
        name: `敵 Lv${game.stage}`,
        maxHp: baseHp,
        hp: baseHp
      };
      updateBattleDisplay();
    }

    // UI更新
    function updateDisplay() {
      document.getElementById('gold').textContent = game.gold;
      document.getElementById('gems').textContent = game.gems;
      document.getElementById('level').textContent = game.level;
      document.getElementById('stage').textContent = game.stage;
      document.getElementById('atkLv').textContent = (1 + game.atk * 0.1).toFixed(1) + 'x';
      document.getElementById('defLv').textContent = (game.def * 0.05).toFixed(2) + 'x';
      document.getElementById('hpLv').textContent = game.maxHp;
      document.getElementById('petCnt').textContent = game.pet;
      document.getElementById('guildLv').textContent = game.guild;
      updateBattleDisplay();
      renderParty();
      save();
    }

    function updateBattleDisplay() {
      if (enemy) {
        document.getElementById('enemyEmoji').textContent = enemy.emoji;
        document.getElementById('enemyName').textContent = enemy.name;
        document.getElementById('enemyHpText').textContent = Math.max(0, enemy.hp);
        document.getElementById('enemyMaxHpText').textContent = enemy.maxHp;
        document.getElementById('enemyHp').style.width = (Math.max(0, enemy.hp) / enemy.maxHp * 100) + '%';
      }
      document.getElementById('playerHpText').textContent = Math.max(0, game.currentHp);
      document.getElementById('playerMaxHpText').textContent = game.maxHp;
      document.getElementById('playerHp').style.width = (Math.max(0, game.currentHp) / game.maxHp * 100) + '%';
    }

    // バトル
    function attack() {
      if (!enemy || enemy.hp <= 0) {
        spawnEnemy();
        return;
      }
      const dmg = Math.floor((1 + game.atk * 0.1) * (1 + getWeaponBonus()) * (0.8 + Math.random() * 0.4));
      enemy.hp -= dmg;
      document.getElementById('damage').textContent = dmg;
      if (enemy.hp <= 0) killEnemy();
      updateBattleDisplay();
    }

    function skill() {
      if (!enemy || enemy.hp <= 0) return;
      const dmg = Math.floor((1 + game.atk * 0.15) * 50);
      enemy.hp -= dmg;
      document.getElementById('damage').textContent = dmg + ' (skill)';
      if (enemy.hp <= 0) killEnemy();
      updateBattleDisplay();
    }

    function defend() {
      game.defending = !game.defending;
    }

    function killEnemy() {
      const g = Math.floor((30 + game.stage * 10) * (1 + game.guild * 0.1));
      const gem = Math.floor(Math.random() * 3) + 1;
      game.gold += g;
      game.gems += gem;
      document.getElementById('reward').textContent = g;
      game.stage++;
      game.maxStage = Math.max(game.maxStage, game.stage);
      setTimeout(() => {
        spawnEnemy();
        updateDisplay();
      }, 500);
      save();
    }

    // 強化
    function upgradeAtk() {
      const cost = Math.floor(100 * Math.pow(1.1, game.atk));
      if (game.gold < cost) return;
      game.gold -= cost;
      game.atk++;
      updateDisplay();
    }

    function upgradeDef() {
      const cost = Math.floor(150 * Math.pow(1.15, game.def));
      if (game.gold < cost) return;
      game.gold -= cost;
      game.def++;
      updateDisplay();
    }

    function upgradeHp() {
      const cost = Math.floor(80 * Math.pow(1.08, game.hp));
      if (game.gold < cost) return;
      game.gold -= cost;
      game.hp++;
      game.maxHp = 100 + game.hp * 20;
      game.currentHp = game.maxHp;
      updateDisplay();
    }

    function buyPet() {
      if (game.gold < 50) return;
      game.gold -= 50;
      game.pet++;
      updateDisplay();
    }

    function upgradeGuild() {
      const cost = Math.floor(500 * Math.pow(1.2, game.guild));
      if (game.gold < cost) return;
      game.gold -= cost;
      game.guild++;
      updateDisplay();
    }

    // ガチャ
    const videoFiles = {
      weapon: 'A_dramatic_game_gacha_weapon_reveal_cinematic_The-1782643204614.mp4',
      hero: 'An_epic_game_gacha_character_reveal_animation_The-1782643194955.mp4',
      prestige: 'A_gorgeous_game_transcendence_evolution_cinematic-1782643212819.mp4'
    };

    async function playVideo(type) {
      const video = document.getElementById('gachaVideo');
      const container = document.getElementById('videoContainer');
      
      video.src = videoFiles[type] || videoFiles.weapon;
      container.classList.add('show');
      
      return new Promise((resolve) => {
        const onEnded = () => {
          container.classList.remove('show');
          video.removeEventListener('ended', onEnded);
          resolve();
        };
        video.addEventListener('ended', onEnded);
        video.play().catch(() => {
          container.classList.remove('show');
          resolve();
        });
      });
    }

    async function gachaWeapon(count) {
      const costs = { 1: 10, 3: 28, 10: 90 };
      if (game.gems < costs[count]) return;
      game.gems -= costs[count];
      updateDisplay();
      await playVideo('weapon');
      for (let i = 0; i < count; i++) {
        game.weapons.push({ rarity: getRandomRarity() });
      }
      if (game.weapons.length > 5) game.weapons.shift();
      alert('武器ガチャ完了！');
      updateDisplay();
    }

    async function gachaHero(count) {
      const costs = { 1: 15, 3: 40, 10: 130 };
      if (game.gems < costs[count]) return;
      game.gems -= costs[count];
      updateDisplay();
      await playVideo('hero');
      const heroes = ['h_maoh', 'h_warrior', 'h_hime', 'h_mahotsukai', 'h_shinigami', 'h_oji', 'h_gold'];
      for (let i = 0; i < count; i++) {
        const h = heroes[Math.floor(Math.random() * heroes.length)];
        game.heroes[h] = (game.heroes[h] || 0) + 1;
      }
      alert('仲間ガチャ完了！');
      renderParty();
      updateDisplay();
    }

    async function prestige() {
      if (!confirm('転生しますか？')) return;
      game.prestige++;
      game.stage = 1;
      game.currentHp = game.maxHp;
      for (let i = 0; i < Math.min(5, 1 + Math.floor(game.maxStage / 10)); i++) {
        await playVideo('prestige');
        game.weapons.push({ rarity: getRandomRarity() });
      }
      if (game.weapons.length > 5) game.weapons = game.weapons.slice(-5);
      alert('転生成功！');
      updateDisplay();
    }

    function watchAd() {
      game.gems += 5;
      updateDisplay();
    }

    // ユーティリティ
    function getRandomRarity() {
      const r = Math.random();
      if (r < 0.6) return 'common';
      if (r < 0.85) return 'rare';
      if (r < 0.97) return 'sr';
      return 'legend';
    }

    function getWeaponBonus() {
      if (game.weapons.length === 0) return 0;
      const bonuses = { common: 0.15, rare: 0.5, sr: 2, legend: 8 };
      return game.weapons.reduce((sum, w) => sum + (bonuses[w.rarity] || 0), 0) / game.weapons.length;
    }

    function renderParty() {
      const heroList = [
        { id: 'h_maoh', name: '魔王', img: 'images/character_monster_mao_02.png' },
        { id: 'h_warrior', name: '戦士', img: 'images/character_senshi_red.png' },
        { id: 'h_hime', name: '姫', img: 'images/character_hime_01_white_silver.png' },
        { id: 'h_mahotsukai', name: '魔法使い', img: 'images/character_mahotsukai_01_purple.png' },
        { id: 'h_shinigami', name: '死神', img: 'images/character_monster_shinigami_02.png' },
        { id: 'h_oji', name: '王子', img: 'images/character_oji_03_green_gold.png' },
        { id: 'h_gold', name: 'ゴールド', img: 'images/character_hero_gold.png' }
      ];

      let html = '';
      heroList.forEach(h => {
        if (game.heroes[h.id]) {
          html += `
            <div class="party-card">
              <img src="${h.img}" alt="${h.name}" class="party-img" onerror="this.style.display='none'">
              <div class="party-name">${h.name}</div>
              <div class="party-level">Lv${game.heroes[h.id]}</div>
            </div>
          `;
        }
      });
      document.getElementById('partyDisplay').innerHTML = html;
      document.getElementById('gachaPartyDisplay').innerHTML = html;
    }

    // UI
    function switchTab(idx) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-content')[idx].classList.add('active');
      document.querySelectorAll('.tab-btn')[idx].classList.add('active');
    }

    function openMenu(type) {
      document.getElementById('menuModal').classList.add('active');
      const title = document.getElementById('menuTitle');
      const content = document.getElementById('menuContent');

      if (type === 'weapon') {
        title.textContent = '武器一覧';
        content.innerHTML = game.weapons.length > 0
          ? game.weapons.map((w, i) => `<div class="modal-item">${i + 1}. ${w.rarity}</div>`).join('')
          : '<div class="modal-item">武器がありません</div>';
      }
    }

    function closeMenu() {
      document.getElementById('menuModal').classList.remove('active');
    }

    // セーブ・ロード
    function save() {
      localStorage.setItem('dungeonRPG', JSON.stringify(game));
    }

    function load() {
      const data = localStorage.getItem('dungeonRPG');
      if (data) Object.assign(game, JSON.parse(data));
    }

    // 初期化
    load();
    updateDisplay();
    spawnEnemy();
  </script>
</body>
</html>
