<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="monetag" content="ea498005396531d171f9e1a39f62f5b9">
  <title>ダンジョン討伐RPG - 本格版</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background: #0a0a0f;
      color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 8px; padding-bottom: 70px;
    }

    .game-container {
      width: 100%; max-width: 440px;
      background: rgba(10, 10, 20, 0.98);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.3), 0 20px 60px rgba(0,0,0,0.9);
      border: 1px solid rgba(233, 69, 96, 0.3);
    }

    /* ヘッダー */
    .header {
      background: linear-gradient(135deg, #1a0a1e, #2d1b3d);
      padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid rgba(233, 69, 96, 0.5); position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; top: 0; left: -100%; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(233,69,96,0.1), transparent);
      animation: header-shine 4s ease-in-out infinite;
    }
    @keyframes header-shine { 0% { left: -100%; } 100% { left: 100%; } }
    
    .player-info { font-size: 14px; font-weight: 900; color: #f093fb; }
    .resources { display: flex; gap: 14px; font-size: 13px; font-weight: 900; }
    .gold { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
    .gem { color: #00f2fe; text-shadow: 0 0 10px rgba(0,242,254,0.5); }

    /* タブ */
    .tabs { display: flex; background: rgba(0,0,0,0.6); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .tab-btn {
      flex: 1; padding: 10px 2px; background: none; border: none;
      color: rgba(255,255,255,0.4); font-family: inherit; font-weight: 900;
      font-size: 10px; cursor: pointer; transition: all 0.3s;
      border-bottom: 2px solid transparent; position: relative;
    }
    .tab-btn.active {
      color: white; border-bottom-color: #e94560; background: rgba(233,69,96,0.08);
    }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 4px; height: 4px; background: #e94560; border-radius: 50%;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Canvas バトルエリア */
    .battle-wrapper { position: relative; background: #0a0a1a; overflow: hidden; }
    #battleCanvas { display: block; width: 100%; cursor: pointer; }
    .battle-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none;
    }
    .stage-badge {
      position: absolute; top: 10px; left: 12px;
      background: rgba(0,0,0,0.7); border: 1px solid rgba(168,237,234,0.4);
      border-radius: 8px; padding: 4px 10px;
      font-size: 11px; font-weight: 900; color: #a8edea;
    }
    .prestige-badge {
      position: absolute; top: 10px; right: 12px;
      background: rgba(0,0,0,0.7); border: 1px solid rgba(255,215,0,0.4);
      border-radius: 8px; padding: 4px 10px;
      font-size: 11px; font-weight: 900; color: #FFD700;
    }

    /* HPバー */
    .bars-area {
      background: rgba(0,0,0,0.8); padding: 10px 14px 8px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .bar-row { margin-bottom: 6px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 3px; color: rgba(255,255,255,0.7); }
    .bar-track {
      background: rgba(255,255,255,0.08); border-radius: 6px; height: 10px; overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }
    .hp-fill {
      height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b6b, #ff9ff3);
      border-radius: 6px; transition: width 0.4s ease; box-shadow: 0 0 8px rgba(255,71,87,0.6);
      position: relative; overflow: hidden;
    }
    .hp-fill::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: bar-shine 2s ease-in-out infinite;
    }
    @keyframes bar-shine { 0% { left: -100%; } 100% { left: 200%; } }
    
    .mp-fill {
      height: 100%; background: linear-gradient(90deg, #0052d4, #4facfe, #00f2fe);
      border-radius: 6px; transition: width 0.4s ease; box-shadow: 0 0 8px rgba(79,172,254,0.6);
      position: relative; overflow: hidden;
    }
    .mp-fill::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: bar-shine 2.5s ease-in-out infinite;
    }

    /* スキルボタン */
    .skill-area {
      background: rgba(5,5,15,0.9); padding: 8px 10px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .skill-btn {
      padding: 8px 6px; border-radius: 10px; font-family: inherit; font-weight: 900;
      font-size: 10px; cursor: pointer; transition: all 0.2s; text-align: center;
      position: relative; overflow: hidden;
      border: 1px solid rgba(79,172,254,0.4); background: rgba(79,172,254,0.08); color: #4facfe;
    }
    .skill-btn::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(79,172,254,0.15) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.3s;
    }
    .skill-btn:active { transform: scale(0.95); }
    .skill-btn:active::before { opacity: 1; }
    .skill-btn.ready {
      border-color: rgba(79,172,254,0.8);
      box-shadow: 0 0 12px rgba(79,172,254,0.3), inset 0 0 12px rgba(79,172,254,0.05);
      animation: skill-pulse 2s ease-in-out infinite;
    }
    @keyframes skill-pulse {
      0%,100% { box-shadow: 0 0 8px rgba(79,172,254,0.3); }
      50% { box-shadow: 0 0 20px rgba(79,172,254,0.6); }
    }
    .skill-btn.active {
      border-color: #feca57; color: #feca57; background: rgba(254,202,87,0.1);
      box-shadow: 0 0 15px rgba(254,202,87,0.3);
    }
    .skill-btn.disabled { opacity: 0.3; border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); }
    .skill-cooldown { font-size: 8px; opacity: 0.8; margin-top: 2px; }

    /* 残りのCSS（パーティー、ステータス、アップグレードボタンなど）は前回と同様 */
    .party-area {
      background: rgba(5,5,15,0.95); padding: 8px 12px;
      border-top: 1px solid rgba(255,255,255,0.04); min-height: 50px;
    }
    .party-title { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
    .party-members { display: flex; flex-wrap: wrap; gap: 5px; }
    .member-chip {
      display: flex; align-items: center; gap: 4px; padding: 4px 8px;
      border-radius: 8px; font-size: 10px; font-weight: 900;
      border: 1px solid; background: rgba(0,0,0,0.3);
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .member-chip.attacking { filter: brightness(1.5); }

    .stats-bar {
      background: rgba(0,0,0,0.7); padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(255,215,0,0.1);
    }
    .total-atk {
      font-size: 15px; font-weight: 900; color: #FFD700;
      text-shadow: 0 0 10px rgba(255,215,0,0.4);
    }

    .upgrade-section { padding: 10px; }
    .upgrade-btn {
      width: 100%; padding: 12px 14px; margin-bottom: 7px; border-radius: 12px;
      color: white; font-family: inherit; font-weight: 900; cursor: pointer;
      transition: all 0.2s; display: flex; justify-content: space-between; align-items: center;
      position: relative; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(135deg, rgba(15,52,96,0.8), rgba(22,33,62,0.9));
    }
    .upgrade-btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: left 0.5s;
    }
    .upgrade-btn:hover::before { left: 100%; }
    .upgrade-btn:active { transform: scale(0.99); }
    .upgrade-btn.disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-left { text-align: left; }
    .btn-title { font-size: 13px; margin-bottom: 2px; }
    .btn-desc { font-size: 10px; opacity: 0.65; }
    .btn-cost { color: #FFD700; font-size: 12px; font-weight: 900; text-align: right; min-width: 60px; }
    .btn-ad {
      background: linear-gradient(135deg, rgba(255,107,107,0.3), rgba(254,202,87,0.3));
      border-color: rgba(255,107,107,0.4);
    }
    .btn-prestige {
      background: linear-gradient(135deg, rgba(168,237,234,0.2), rgba(254,214,227,0.2));
      border-color: rgba(255,215,0,0.4); color: #a8edea; display: none;
    }
    .btn-prestige.visible { display: flex; }

    /* 他のタブのCSS（武器、ペット、ギルド、ガチャ、ランキング）も前回と同様に含める */
    .section-content { padding: 12px; }
    .section-title {
      text-align: center; font-size: 15px; font-weight: 900; margin-bottom: 12px;
      background: linear-gradient(90deg, #f093fb, #f5576c);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .info-box {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 10px; margin-bottom: 10px; text-align: center;
    }
    .card-grid { display: grid; grid-template-columns: 1fr; gap: 7px; }
    .item-card {
      background: rgba(255,255,255,0.03); border-radius: 10px; padding: 10px;
      border: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 10px; transition: all 0.2s;
    }
    .item-card:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); }
    .item-card.equipped { border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.04); }
    .item-card.pet-active { border-color: rgba(240,147,251,0.4); background: rgba(240,147,251,0.04); }
    .item-emoji { font-size: 22px; min-width: 28px; text-align: center; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 12px; font-weight: 900; margin-bottom: 2px; }
    .item-meta { font-size: 10px; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
    .item-skill-tag {
      display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 4px;
      margin-top: 3px; font-weight: 900;
    }
    .skill-tag-has { background: rgba(240,147,251,0.2); color: #f093fb; border: 1px solid rgba(240,147,251,0.3); }
    .skill-tag-none { background: rgba(100,100,100,0.2); color: #666; border: 1px solid rgba(100,100,100,0.2); }
    .item-actions { display: flex; flex-direction: column; gap: 3px; min-width: 52px; }
    .action-btn {
      background: linear-gradient(135deg, #4facfe, #00f2fe); color: #0a0a1a;
      border: none; border-radius: 6px; padding: 5px 8px;
      font-family: inherit; font-weight: 900; font-size: 9px; cursor: pointer; transition: all 0.2s;
    }
    .action-btn:active { transform: scale(0.96); }
    .active-badge {
      background: linear-gradient(135deg, #FFD700, #FFA500); color: #0a0a1a;
      border-radius: 6px; padding: 5px 8px; font-weight: 900; font-size: 9px; text-align: center;
    }

    /* レアリティカラー */
    .rarity-common { color: #aaa; }
    .rarity-rare { color: #6495ED; }
    .rarity-sr { color: #FFA500; }
    .rarity-legend { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6); }
  </style>
</head>
<body>

<div class="game-container">
  <!-- ヘッダー -->
  <div class="header">
    <div class="player-info">⚔️ <span id="playerNameDisplay">冒険者</span></div>
    <div class="resources">
      <div class="gold">💰 <span id="goldDisplay">0</span></div>
      <div class="gem">💎 <span id="gemDisplay">0</span></div>
    </div>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('battle')">⚔️ バトル</button>
    <button class="tab-btn" onclick="switchTab('weapon')">🗡️ 武器</button>
    <button class="tab-btn" onclick="switchTab('pet')">🐾 ペット</button>
    <button class="tab-btn" onclick="switchTab('guild')">🏰 ギルド</button>
    <button class="tab-btn" onclick="switchTab('gacha')">🎰 ガチャ</button>
    <button class="tab-btn" onclick="switchTab('ranking')">🏆 ランク</button>
  </div>

  <!-- バトルタブ -->
  <div class="tab-content active" id="tab-battle">
    <div class="battle-wrapper">
      <canvas id="battleCanvas" width="440" height="280"></canvas>
      <div class="battle-overlay">
        <div class="stage-badge">ダンジョン <span id="stageDisplay">1</span>階</div>
        <div class="prestige-badge">転生 Lv.<span id="prestigeDisplay">0</span></div>
      </div>
    </div>

    <!-- HPバー -->
    <div class="bars-area">
      <div class="bar-row">
        <div class="bar-label">
          <span>❤️ <span id="enemyNameDisplay">ダークラット</span></span>
          <span><span id="currentHp">10</span> / <span id="maxHp">10</span></span>
        </div>
        <div class="bar-track"><div class="hp-fill" id="hpBar" style="width:100%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">
          <span>💧 MP</span>
          <span><span id="currentMp">100</span> / <span id="maxMp">100</span></span>
        </div>
        <div class="bar-track"><div class="mp-fill" id="mpBar" style="width:100%"></div></div>
      </div>
    </div>

    <!-- スキル -->
    <div class="skill-area">
      <button class="skill-btn" id="skillBurst" onclick="useSkill('burst')">
        ⚡ 魔力解放<div class="skill-cooldown">MP50 | 1分分攻撃</div>
      </button>
      <button class="skill-btn" id="skillAutoTap" onclick="useSkill('autotap')">
        👆 自動タップ<div class="skill-cooldown">MP30 | 30秒自動</div>
      </button>
      <button class="skill-btn" id="skillTapBoost" onclick="useSkill('tapboost')">
        💥 タップ強化<div class="skill-cooldown">MP40 | 60秒×5倍</div>
      </button>
      <button class="skill-btn" id="skillHeal" onclick="useSkill('heal')">
        💧 MP回復<div class="skill-cooldown">💎5 | 全回復</div>
      </button>
    </div>

    <!-- パーティー -->
    <div class="party-area">
      <div class="party-title">👥 パーティー (<span id="partyCount">0</span>人) | 🐾 <span id="activePetDisplay">ペットなし</span></div>
      <div class="party-members" id="partyMembers">
        <span style="font-size:10px;opacity:0.4;">仲間を雇って自動攻撃！</span>
      </div>
    </div>

    <!-- ステータス -->
    <div class="stats-bar">
      <div>
        <div class="total-atk">総攻撃力: <span id="totalAtkDisplay">1</span></div>
        <div style="font-size:10px;color:rgba(255,255,255,0.5);">武器×<span id="weaponBonusDisplay">1.00</span> | ペット×<span id="petBonusDisplay">1.00</span></div>
      </div>
      <div style="text-align:right;font-size:10px;color:rgba(255,255,255,0.6);">
        <div>プレイヤー: <span id="playerAtkDisplay">1</span></div>
        <div>仲間: <span id="memberAtkDisplay">0</span>/秒</div>
      </div>
    </div>

    <!-- アップグレード -->
    <div class="upgrade-section">
      <button class="upgrade-btn" id="btnAttack" onclick="upgradeAttack()">
        <div class="btn-left">
          <div class="btn-title">⚔️ 剣術訓練</div>
          <div class="btn-desc">プレイヤー攻撃力を強化</div>
        </div>
        <div class="btn-cost">💰 <span id="attackCost">10</span></div>
      </button>
      <button class="upgrade-btn" id="btnHire" onclick="hireMember()">
        <div class="btn-left">
          <div class="btn-title">👥 仲間を雇う</div>
          <div class="btn-desc">剣士・弓使い・魔法使いがランダム参加</div>
        </div>
        <div class="btn-cost">💰 <span id="hireCost">50</span></div>
      </button>
      <button class="upgrade-btn btn-ad" onclick="watchAd()">
        <div class="btn-left">
          <div class="btn-title">📺 広告でジェム獲得</div>
          <div class="btn-desc">💎5 + 30秒間攻撃力5倍</div>
        </div>
        <div class="btn-cost">FREE</div>
      </button>
      <button class="upgrade-btn btn-prestige" id="btnPrestige" onclick="prestige()">
        <div class="btn-left">
          <div class="btn-title">✨ 転生</div>
          <div class="btn-desc">階層ボーナス武器ドロップ + 永続強化</div>
        </div>
        <div class="btn-cost">RESET</div>
      </button>
    </div>
  </div>

  <!-- その他のタブ（武器、ペット、ギルド、ガチャ、ランキング）のHTMLも前回と同様に含める -->
  <div class="tab-content" id="tab-weapon">
    <div class="section-content">
      <div class="section-title">🗡️ 武器管理</div>
      <div class="info-box">
        <div style="font-size:10px;opacity:0.6;margin-bottom:3px;">現在の武器ボーナス</div>
        <div style="font-size:18px;font-weight:900;color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,0.4);">攻撃力 ×<span id="weaponBonusDetail">1.00</span></div>
        <div style="font-size:9px;opacity:0.5;margin-top:3px;">装備中:100%効果 / 控え:5%効果</div>
      </div>
      <div class="card-grid" id="weaponGrid">
        <div style="text-align:center;opacity:0.3;font-size:11px;padding:20px;">敵を倒すと武器ドロップ！</div>
      </div>
    </div>
  </div>

  <!-- 他のタブも同様に含める（ペット、ギルド、ガチャ、ランキング） -->
</div>

<script>
// ================================================================
// Canvas バトルシステム
// ================================================================
const canvas = document.getElementById('battleCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// パーティクルシステム
const particles = [];
const projectiles = [];
const floatingTexts = [];

class Particle {
  constructor(x, y, vx, vy, color, size, life) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.size = size;
    this.life = life;
    this.maxLife = life;
    this.gravity = 0.15;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.98;
    this.life--;
    return this.life > 0;
  }
  draw() {
    const alpha = this.life / this.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

class Projectile {
  constructor(sx, sy, tx, ty, emoji, speed, color) {
    this.x = sx; this.y = sy;
    this.tx = tx; this.ty = ty;
    const dx = tx - sx, dy = ty - sy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    this.vx = (dx / dist) * speed;
    this.vy = (dy / dist) * speed;
    this.emoji = emoji;
    this.color = color;
    this.size = 20;
    this.alive = true;
    this.rotation = Math.atan2(dy, dx);
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    const dx = this.tx - this.x, dy = this.ty - this.y;
    if (Math.sqrt(dx*dx + dy*dy) < 15) this.alive = false;
    return this.alive;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.font = `${this.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 10;
    ctx.fillText(this.emoji, 0, 0);
    ctx.restore();
  }
}

class FloatingText {
  constructor(x, y, text, color, size) {
    this.x = x; this.y = y;
    this.text = text;
    this.color = color;
    this.size = size || 18;
    this.life = 60;
    this.maxLife = 60;
    this.vy = -1.5;
  }
  update() {
    this.y += this.vy;
    this.vy *= 0.96;
    this.life--;
    return this.life > 0;
  }
  draw() {
    const alpha = this.life / this.maxLife;
    const scale = this.life > 50 ? 1 + (60 - this.life) * 0.05 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.x, this.y);
    ctx.scale(scale, scale);
    ctx.font = `900 ${this.size}px 'M PLUS Rounded 1c', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
    ctx.lineWidth = 3;
    ctx.strokeText(this.text, 0, 0);
    ctx.fillText(this.text, 0, 0);
    ctx.restore();
  }
}

// ================================================================
// メインCanvasレンダリング
// ================================================================
function drawBackground() {
  // 深いダンジョン背景
  const gradient = ctx.createLinearGradient(0, 0, 0, H);
  gradient.addColorStop(0, '#050510');
  gradient.addColorStop(0.5, '#0a0a20');
  gradient.addColorStop(1, '#0d0d2a');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  // 床のタイル感
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, H * 0.65); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(0, H * 0.65); ctx.lineTo(W, H * 0.65); ctx.stroke();

  // 背景の魔法陣オーブ
  magicOrbs.forEach(orb => {
    orb.angle += orb.speed;
    const x = orb.x + Math.cos(orb.angle) * orb.radius;
    const y = orb.y + Math.sin(orb.angle) * orb.radius;
    ctx.save();
    ctx.globalAlpha = orb.alpha;
    const g = ctx.createRadialGradient(x, y, 0, x, y, 20);
    g.addColorStop(0, orb.color);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });

  // 星
  bgStars.forEach(star => {
    star.twinkle += 0.05;
    star.y += star.speed;
    if (star.y > H) star.y = 0;
    const alpha = star.alpha * (0.7 + 0.3 * Math.sin(star.twinkle));
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'white';
    ctx.shadowColor = 'white';
    ctx.shadowBlur = 3;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // 床の光
  ctx.save();
  ctx.globalAlpha = 0.05;
  const floorGrad = ctx.createLinearGradient(0, H * 0.65, 0, H);
  floorGrad.addColorStop(0, '#4facfe');
  floorGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, H * 0.65, W, H * 0.35);
  ctx.restore();
}

function drawEnemy() {
  const s = enemyState;
  s.floatAngle += 0.04;
  s.floatOffset = Math.sin(s.floatAngle) * 6;

  ctx.save();
  ctx.translate(s.x, s.y + s.floatOffset);

  // ボス用オーラ
  if (s.isBoss) {
    const time = Date.now() * 0.002;
    for (let i = 0; i < 3; i++) {
      const auraRadius = 55 + Math.sin(time + i * 2) * 8;
      ctx.save();
      ctx.globalAlpha = 0.08;
      const auraGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, auraRadius);
      auraGrad.addColorStop(0, '#FFD700');
      auraGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = auraGrad;
      ctx.beginPath();
      ctx.arc(0, 0, auraRadius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // 影
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.scale(1, 0.3);
  ctx.beginPath();
  ctx.ellipse(0, 85, 35 * s.scale, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ヒットフラッシュ
  if (s.hitFlash > 0) {
    ctx.save();
    ctx.globalAlpha = s.hitFlash * 0.7;
    ctx.fillStyle = 'white';
    ctx.font = `${80 * s.scale}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.filter = 'brightness(10)';
    ctx.fillText(s.emoji, 0, 0);
    ctx.restore();
    s.hitFlash -= 0.08;
  }

  // 敵本体
  ctx.font = `${80 * s.scale}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = s.isBoss ? '#FFD700' : '#ff6b6b';
  ctx.shadowBlur = s.isBoss ? 25 : 15;
  ctx.fillText(s.emoji, 0, 0);

  ctx.restore();
}

function drawMembers() {
  memberStates.forEach((ms, i) => {
    ms.bobAngle += 0.06;
    const bobY = Math.sin(ms.bobAngle) * 3;

    ctx.save();
    ctx.translate(ms.x, ms.y + bobY);

    // メンバーの光輪
    ctx.save();
    ctx.globalAlpha = 0.15;
    const glowGrad = ctx.createRadialGradient(0, 5, 0, 0, 5, 25);
    glowGrad.addColorStop(0, ms.color);
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, 5, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 攻撃アニメーション
    if (ms.attackAnim > 0) {
      ctx.translate(5 * ms.attackAnim, -3 * ms.attackAnim);
      ms.attackAnim -= 0.15;
      if (ms.attackAnim < 0) ms.attackAnim = 0;
    }

    // キャラクター
    ctx.font = '28px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = ms.color;
    ctx.shadowBlur = 12;
    ctx.fillText(ms.emoji, 0, 0);

    // 名前
    ctx.font = '800 8px sans-serif';
    ctx.fillStyle = ms.color;
    ctx.shadowBlur = 5;
    ctx.fillText(ms.name, 0, 20);

    ctx.restore();
  });
}

// メインレンダーループ
let frameCount = 0;
function render() {
  requestAnimationFrame(render);
  frameCount++;

  // シェイク処理
  if (shakePower > 0) {
    shakeX = (Math.random() - 0.5) * shakePower * 2;
    shakeY = (Math.random() - 0.5) * shakePower * 2;
    shakePower *= 0.85;
    if (shakePower < 0.1) shakePower = 0;
  } else {
    shakeX = 0; shakeY = 0;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // 背景
  drawBackground();

  // 仲間
  drawMembers();

  // 敵
  drawEnemy();

  // パーティクル
  for (let i = particles.length - 1; i >= 0; i--) {
    if (!particles[i].update()) particles.splice(i, 1);
    else particles[i].draw();
  }

  // 飛翔物
  for (let i = projectiles.length - 1; i >= 0; i--) {
    if (!projectiles[i].update()) {
      // 命中エフェクト
      spawnHitParticles(projectiles[i].tx, projectiles[i].ty, projectiles[i].color);
      projectiles.splice(i, 1);
    } else {
      projectiles[i].draw();
    }
  }

  // フローティングテキスト
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    if (!floatingTexts[i].update()) floatingTexts.splice(i, 1);
    else floatingTexts[i].draw();
  }

  ctx.restore();
}

// ================================================================
// エフェクト生成関数
// ================================================================
function spawnHitParticles(x, y, color) {
  const colors = [color, '#ffffff', '#FFD700'];
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.5;
    const speed = Math.random() * 4 + 2;
    particles.push(new Particle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - 2,
      colors[Math.floor(Math.random() * colors.length)],
      Math.random() * 3 + 1,
      Math.random() * 20 + 15
    ));
  }
}

function spawnSlashEffect(x, y) {
  // 斬撃パーティクル
  const colors = ['#ffffff', '#ffffaa', '#ffaaaa'];
  for (let i = 0; i < 8; i++) {
    const angle = -Math.PI / 4 + (Math.random() - 0.5) * Math.PI / 2;
    const speed = Math.random() * 6 + 3;
    particles.push(new Particle(
      x + (Math.random() - 0.5) * 30,
      y + (Math.random() - 0.5) * 30,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      colors[Math.floor(Math.random() * colors.length)],
      Math.random() * 2 + 1,
      Math.random() * 15 + 10
    ));
  }
}

function spawnSkillEffect(x, y) {
  const colors = ['#4facfe', '#00f2fe', '#ffffff', '#f093fb'];
  for (let i = 0; i < 30; i++) {
    const angle = (Math.PI * 2 / 30) * i;
    const speed = Math.random() * 8 + 3;
    particles.push(new Particle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      colors[Math.floor(Math.random() * colors.length)],
      Math.random() * 4 + 2,
      Math.random() * 40 + 30
    ));
  }
}

function fireProjectile(memberState, targetX, targetY) {
  const projConfigs = {
    '🗡️': { emoji: '⚔️', speed: 12, color: '#ff6b6b' },
    '🏹': { emoji: '➡️', speed: 15, color: '#4facfe' },
    '🔮': { emoji: '✨', speed: 10, color: '#f093fb' }
  };
  const config = projConfigs[memberState.emoji] || projConfigs['🗡️'];
  projectiles.push(new Projectile(
    memberState.x, memberState.y - 10,
    targetX, targetY,
    config.emoji, config.speed, config.color
  ));
  memberState.attackAnim = 1.0;
}

// ================================================================
// ゲームロジック（前回のv4と同じ効果計算システム）
// ================================================================
function getActiveWeaponSkills() {
  if (!game.equippedWeapon || !game.weapons[game.equippedWeapon]) return [];
  return (game.weapons[game.equippedWeapon].skills || [])
    .map(sid => WEAPON_SKILLS.find(s => s.id === sid)).filter(Boolean);
}
function hasWeaponSkill(id) { return getActiveWeaponSkills().some(s => s.id === id); }

function getPetEffect(type) {
  if (!game.activePet || !game.pets[game.activePet]) return 0;
  const def = PET_DEFS.find(p => p.id === game.activePet);
  if (!def) return 0;
  const lv = game.pets[game.activePet].level || 1;
  const lvM = 1 + (lv - 1) * 0.2;
  return (def.effect === type || def.effect === 'all') ? def.value * lvM : 0;
}

function getGuildEffect(type) {
  let total = 0;
  Object.entries(game.guild.upgrades).forEach(([id, lv]) => {
    const u = GUILD_UPGRADES.find(g => g.id === id);
    if (u && (u.effect === type || u.effect === 'all')) total += u.value * lv;
  });
  return total;
}

function getWeaponBonus() {
  let bonus = 1.0;
  Object.entries(game.weapons).forEach(([wid, wd]) => {
    const rd = RARITIES[wd.rarity];
    const lv = wd.level || 1;
    const lvM = 1 + (lv - 1) * 0.3;
    const base = rd.baseBonus * lvM;
    bonus += (wid === game.equippedWeapon) ? base : base * 0.05;
  });
  return parseFloat(bonus.toFixed(3));
}

function getPetBonus() { return 1 + getPetEffect('atk') + getGuildEffect('atk'); }

function getPlayerAttack() {
  const base = game.attackLevel * 2.0;
  const prestige = 1 + game.prestigeLevel * 0.5;
  const weapon = getWeaponBonus();
  const pet = getPetBonus();
  const boost = game.boostTimer > 0 ? 5 : 1;
  const tapBoost = game.tapBoostTimer > 0 ? 5 : 1;
  return Math.floor(base * prestige * weapon * pet * boost * tapBoost);
}

// その他の計算関数も前回と同様...
function getMemberAttack(member) {
  const base = (member.level || 1) * 1.5;
  const prestige = 1 + game.prestigeLevel * 0.5;
  return Math.floor(base * prestige * getWeaponBonus() * getPetBonus() * (game.boostTimer > 0 ? 5 : 1));
}

function getTotalMemberAttack() { return game.members.reduce((s, m) => s + getMemberAttack(m), 0); }
function getTotalAttack() { return getPlayerAttack() + getTotalMemberAttack(); }
function getAttackCost() { return Math.floor(10 * Math.pow(1.3, game.attackLevel - 1)); }
function getHireCost() { return Math.floor(50 * Math.pow(1.5, game.members.length)); }
function getEnemyMaxHp() {
  const base = Math.floor(10 * Math.pow(1.25, game.stage - 1));
  return game.stage % 10 === 0 ? base * 3 : base;
}

function spawnEnemy() {
  game.enemyMaxHp = getEnemyMaxHp();
  game.enemyHp = game.enemyMaxHp;
  const isBoss = game.stage % 10 === 0;
  const data = isBoss
    ? ENEMIES.boss[Math.floor((game.stage / 10 - 1) % ENEMIES.boss.length)]
    : ENEMIES.normal[(game.stage - 1) % ENEMIES.normal.length];

  enemyState.emoji = data.emoji;
  enemyState.isBoss = isBoss;
  enemyState.scale = isBoss ? 1.2 : 1.0;
  enemyState.hitFlash = 0;

  document.getElementById('enemyNameDisplay').textContent = data.name;
  updateDisplay();
}

canvas.addEventListener('click', function(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;
  handleAttack(cx, cy);
});

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const touch = e.touches[0];
  const cx = (touch.clientX - rect.left) * scaleX;
  const cy = (touch.clientY - rect.top) * scaleY;
  handleAttack(cx, cy);
}, { passive: false });

function handleAttack(cx, cy) {
  const damage = getPlayerAttack();
  applyDamage(damage);

  // 斬撃エフェクト
  spawnSlashEffect(enemyState.x, enemyState.y);

  // ダメージ数字（Canvas上）
  const color = game.tapBoostTimer > 0 ? '#feca57' : '#ff6b6b';
  const size = damage > 1000 ? 24 : 18;
  floatingTexts.push(new FloatingText(
    enemyState.x + (Math.random() - 0.5) * 40,
    enemyState.y - 30,
    Math.floor(damage).toLocaleString(),
    color,
    size
  ));

  // ヒットフラッシュ
  enemyState.hitFlash = 1.0;

  // 画面シェイク
  screenShake(damage > 10000 ? 6 : damage > 1000 ? 4 : 2);
}

function applyDamage(damage) {
  game.enemyHp -= damage;
  if (game.enemyHp <= 0) killEnemy();
  updateDisplay();
}

function killEnemy() {
  const goldGain = getGoldReward();
  game.gold += goldGain;
  game.totalKills++;
  if (game.stage > game.maxStage) game.maxStage = game.stage;

  // 死亡エフェクト
  spawnDeathEffect(enemyState.x, enemyState.y);
  screenShake(8);

  // 武器ドロップ判定
  if (Math.random() < getDropChance()) {
    const rarity = rollRarity();
    const weapon = getRandomWeapon(rarity);
    addWeapon(weapon.id, rarity);
    showDropNotice(weapon, rarity);
  }

  if (game.stage % 10 === 0) showFloorClear();
  game.stage++;
  if (game.stage >= 10) document.getElementById('btnPrestige').classList.add('visible');

  updateLocalRanking();
  setTimeout(spawnEnemy, 400);
}

function spawnDeathEffect(x, y) {
  const colors = ['#ff6b6b', '#FFD700', '#ffffff', '#f093fb'];
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 10 + 2;
    particles.push(new Particle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - 3,
      colors[Math.floor(Math.random() * colors.length)],
      Math.random() * 5 + 2,
      Math.random() * 50 + 30
    ));
  }
}

// ================================================================
// その他のシステム関数（武器、ペット、ギルドなど）
// ================================================================
// 前回のv4と同じ実装を使用（コードの長さ制限のため省略）
// 必要に応じて個別に実装コードを提供可能

// ================================================================
// UI更新・タブ切り替え・セーブロード
// ================================================================
function updateDisplay() {
  const wb = getWeaponBonus();
  const pb = getPetBonus();
  
  document.getElementById('goldDisplay').textContent = Math.floor(game.gold).toLocaleString();
  document.getElementById('gemDisplay').textContent = game.gems;
  document.getElementById('stageDisplay').textContent = game.stage + (game.stage % 10 === 0 ? ' 👑' : '');
  document.getElementById('prestigeDisplay').textContent = game.prestigeLevel;

  const hp = Math.max(0, Math.floor(game.enemyHp));
  document.getElementById('currentHp').textContent = hp.toLocaleString();
  document.getElementById('maxHp').textContent = game.enemyMaxHp.toLocaleString();
  document.getElementById('hpBar').style.width = Math.max(0, game.enemyHp / game.enemyMaxHp * 100) + '%';

  updateMpDisplay();

  document.getElementById('totalAtkDisplay').textContent = getTotalAttack().toLocaleString();
  document.getElementById('weaponBonusDisplay').textContent = wb.toFixed(2);
  document.getElementById('petBonusDisplay').textContent = pb.toFixed(2);
  document.getElementById('playerAtkDisplay').textContent = getPlayerAttack().toLocaleString();
  document.getElementById('memberAtkDisplay').textContent = getTotalMemberAttack().toLocaleString();

  document.getElementById('attackCost').textContent = getAttackCost().toLocaleString();
  document.getElementById('hireCost').textContent = getHireCost().toLocaleString();

  document.getElementById('btnAttack').classList.toggle('disabled', game.gold < getAttackCost());
  document.getElementById('btnHire').classList.toggle('disabled', game.gold < getHireCost());
}

function switchTab(name) {
  const tabs = ['battle','weapon','pet','guild','gacha','ranking'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabs[i] === name));
  document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', tabs[i] === name));
  // 各タブの描画関数も前回と同様
}

// ================================================================
// メインループ
// ================================================================
let memberIdx = 0;

// 仲間自動攻撃（0.5秒）
setInterval(() => {
  if (game.members.length === 0 || game.enemyHp <= 0) return;
  const member = game.members[memberIdx % game.members.length];
  const ms = memberStates.find(m => m.id === member.id);
  memberIdx++;

  const dmg = Math.floor(getMemberAttack(member) / 2);
  if (dmg > 0) {
    if (ms) {
      fireProjectile(ms, enemyState.x, enemyState.y);
    }
    setTimeout(() => {
      if (game.enemyHp > 0) {
        applyDamage(dmg);
        floatingTexts.push(new FloatingText(
          enemyState.x + (Math.random() - 0.5) * 30,
          enemyState.y - 20,
          dmg.toLocaleString(),
          ms ? ms.color : '#ffffff',
          14
        ));
      }
    }, 300);
  }
}, 500);

// その他のタイマー処理も前回と同様...

// ================================================================
// 初期化
// ================================================================
function saveGame() { localStorage.setItem('dungeonRPGv5', JSON.stringify(game)); }
function loadGame() {
  const saved = localStorage.getItem('dungeonRPGv5');
  if (saved) {
    try { game = { ...game, ...JSON.parse(saved) }; }
    catch(e) { console.error('Load error:', e); }
  }
}

// 初期化処理
loadGame();
document.getElementById('playerNameDisplay').textContent = game.playerName;
game.members.forEach(member => spawnMemberState(member));
spawnEnemy();
updateDisplay();

// Canvasレンダリング開始
render();
