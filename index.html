<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ダンジョン討伐RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: linear-gradient(135deg, #0f172a 0%, #1e1b4b 25%, #312e81 75%, #1e293b 100%);
      --glass-bg: rgba(15, 23, 42, 0.85);
      --glass-border: rgba(255, 255, 255, 0.1);
      --primary-color: #3b82f6;
      --accent-color: #f43f5e;
      --gold-color: #fbbf24;
      --gem-color: #06b6d4;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --shadow-glass: 0 8px 32px rgba(0,0,0,0.37);
      --border-radius-lg: 20px;
      --border-radius-md: 12px;
      --border-radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
    html { width: 100%; height: 100%; }
    body {
      width: 100%;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 80px 0;
      position: relative;
      margin: 0;
    }

    .game-container {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: var(--border-radius-lg);
      width: 95%;
      max-width: 100%;
      box-shadow: var(--shadow-glass), inset 0 1px 1px rgba(255,255,255,0.2);
      border: 1px solid var(--glass-border);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .header {
      background: linear-gradient(135deg, var(--accent-color) 0%, #be123c 100%);
      padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 4px 20px rgba(244,63,94,0.3);
      position: relative; overflow: hidden;
    }
    .player-info { font-size: 12px; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .resources { display: flex; gap: 6px; font-size: 10px; font-weight: 900; }
    .gold { color: var(--gold-color); text-shadow: 0 0 10px rgba(251,191,36,0.6); background: rgba(251,191,36,0.1); padding: 2px 5px; border-radius: var(--border-radius-sm); border: 1px solid rgba(251,191,36,0.3); }
    .gem { color: var(--gem-color); text-shadow: 0 0 10px rgba(6,182,212,0.6); background: rgba(6,182,212,0.1); padding: 2px 5px; border-radius: var(--border-radius-sm); border: 1px solid rgba(6,182,212,0.3); }

    .tabs { display: flex; background: rgba(0,0,0,0.4); padding: 3px; gap: 2px; }
    .tab-btn {
      flex: 1; padding: 6px 2px;
      background: transparent; border: none;
      border-radius: var(--border-radius-md);
      color: var(--text-secondary); font-family: inherit; font-weight: 600;
      font-size: 10px; cursor: pointer;
      transition: all 0.3s;
    }
    .tab-btn.active {
      color: var(--text-primary);
      background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(59,130,246,0.05));
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }
    .tab-content { 
      display: none;
      padding: 10px;
      animation: fadeInUp 0.4s ease-out;
    }
    .tab-content.active { display: block; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

    .battle-area {
      background: radial-gradient(circle at 30% 20%, rgba(59,130,246,0.1) 0%, transparent 50%), radial-gradient(circle at 70% 80%, rgba(244,63,94,0.08) 0%, transparent 50%), linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      padding: 14px;
      text-align: center; cursor: pointer;
      position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: var(--border-radius-md);
      margin-bottom: 10px;
      min-height: 180px;
    }
    .stage-info { position: absolute; top: 6px; left: 8px; font-size: 9px; font-weight: 900; background: var(--glass-bg); padding: 3px 6px; border-radius: var(--border-radius-sm); border: 1px solid var(--glass-border); color: #38bdf8; }
    .prestige-info { position: absolute; top: 6px; right: 8px; font-size: 9px; font-weight: 900; background: var(--glass-bg); padding: 3px 6px; border-radius: var(--border-radius-sm); border: 1px solid var(--glass-border); color: var(--gold-color); }
    .boss-crown { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 20px; z-index: 10; animation: crownFloat 2.5s ease-in-out infinite; filter: drop-shadow(0 0 15px var(--gold-color)); display: none; }
    @keyframes crownFloat { 0%,100%{transform:translateX(-50%) translateY(0px);} 50%{transform:translateX(-50%) translateY(-4px);} }
    
    .enemy-emoji {
      font-size: 50px;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
      animation: enemyFloat 4s ease-in-out infinite;
      position: relative;
    }
    .enemy-emoji img {
      width: 50px;
      height: 50px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    @keyframes enemyFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
    .enemy-emoji.hit { animation: enemyHit 0.5s cubic-bezier(0.68,-0.55,0.265,1.55) both; }
    @keyframes enemyHit { 0%{transform:scale(1); filter:brightness(3) drop-shadow(0 0 30px var(--accent-color));} 25%{transform:scale(0.9) rotate(-10deg);} 50%{transform:scale(1.15) rotate(5deg);} 75%{transform:scale(0.95) rotate(-2deg);} 100%{transform:scale(1) rotate(0); filter:drop-shadow(0 10px 20px rgba(0,0,0,0.6));} }
    
    .enemy-name { font-size: 11px; font-weight: 900; color: #fda4af; margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
    .bars-container { width: 90%; max-width: 240px; margin: 0 auto 8px; }
    .bar-row { margin-bottom: 4px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 9px; font-weight: 700; margin-bottom: 1px; }
    .bar-bg { background: rgba(0,0,0,0.6); border-radius: var(--border-radius-md); height: 10px; overflow: hidden; border: 1px solid var(--glass-border); }
    .hp-bar { background: linear-gradient(90deg, #dc2626, var(--accent-color), #fb7185); height: 100%; transition: width 0.3s; box-shadow: 0 0 15px rgba(244,63,94,0.6); }
    .mp-bar { background: linear-gradient(90deg, #1e40af, var(--primary-color), #7dd3fc); height: 100%; transition: width 0.3s; box-shadow: 0 0 15px rgba(59,130,246,0.6); }

    .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 10px; }
    .skill-btn {
      padding: 6px 4px; border-radius: var(--border-radius-md);
      background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(15,23,42,0.8));
      border: 1px solid rgba(59,130,246,0.3);
      color: var(--text-primary); font-family: inherit; font-weight: 700; font-size: 8px; cursor: pointer;
      text-align: center;
    }
    .skill-btn.active { border-color: var(--gold-color); color: var(--gold-color); background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(15,23,42,0.8)); }

    .party-display { background: rgba(0,0,0,0.2); padding: 6px; border-radius: var(--border-radius-md); margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 3px; min-height: 20px; }
    .member-chip {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--border-radius-md);
      padding: 2px 5px;
      display: flex; align-items: center; gap: 2px;
      font-size: 8px; font-weight: 700;
    }
    .member-chip img { width: 16px; height: 16px; image-rendering: pixelated; image-rendering: crisp-edges; border-radius: 2px; }
    .pixel-chip {
      display: flex; align-items: center; gap: 2px;
      background: linear-gradient(135deg, rgba(217,70,239,0.18), rgba(217,70,239,0.06));
      border: 1px solid rgba(217,70,239,0.4);
      border-radius: var(--border-radius-md);
      padding: 2px 4px;
      font-size: 8px; font-weight: 700; color:#f0abfc;
    }
    .pixel-chip img { width: 16px; height: 16px; image-rendering: pixelated; image-rendering: crisp-edges; border-radius: 2px; }

    .upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .upgrade-btn {
      padding: 8px 6px; background: linear-gradient(135deg, rgba(30,41,59,0.8), rgba(15,23,42,0.9));
      border: 1px solid var(--glass-border); border-radius: var(--border-radius-md); color: var(--text-primary);
      font-family: inherit; font-weight: 700; cursor: pointer; font-size: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
      transition: all 0.3s;
    }
    .upgrade-btn:active { transform: scale(0.95); }
    .upgrade-btn.disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-label { font-size: 9px; font-weight: 900; margin-bottom: 2px; }
    .btn-cost { font-size: 8px; color: var(--gold-color); }

    .stat-box { background: rgba(0,0,0,0.2); padding: 6px; border-radius: var(--border-radius-md); text-align: center; margin-bottom: 8px; }
    .stat-label { font-size: 8px; color: var(--text-secondary); margin-bottom: 2px; }
    .stat-value { font-size: 16px; font-weight: 900; color: var(--gold-color); }

    .enhance-section { padding: 10px; background: rgba(0,0,0,0.15); border-radius: var(--border-radius-md); margin-bottom: 8px; }
    .enhance-title { font-size: 11px; font-weight: 900; margin-bottom: 6px; color: var(--gem-color); }
    .enhance-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; padding: 4px; background: rgba(0,0,0,0.2); border-radius: var(--border-radius-sm); }
    .enhance-name { font-size: 9px; flex: 1; }
    .enhance-action { font-size: 8px; padding: 3px 6px; background: linear-gradient(135deg, var(--primary-color), #1e40af); border: none; border-radius: var(--border-radius-sm); color: var(--text-primary); cursor: pointer; font-weight: 700; }

    .gacha-section { padding: 10px; }
    .gacha-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .gacha-tab { flex: 1; padding: 6px; border: 1px solid var(--glass-border); border-radius: var(--border-radius-sm); background: rgba(0,0,0,0.3); color: var(--text-secondary); font-weight: 700; font-size: 10px; cursor: pointer; }
    .gacha-tab.active { background: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.5); color: var(--text-primary); }
    .gacha-panel { display: none; }
    .gacha-panel.active { display: block; }
    .gacha-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 8px; }
    .gacha-btn { padding: 10px 5px; border: none; border-radius: var(--border-radius-md); font-weight: 900; font-size: 9px; cursor: pointer; }
    .gacha-single { background: linear-gradient(135deg, var(--primary-color), #1e40af); color: var(--text-primary); }
    .gacha-ten { background: linear-gradient(135deg, var(--accent-color), #be123c); color: var(--text-primary); grid-column: 1/-1; }
    .gem-display { background: linear-gradient(135deg, rgba(6,182,212,0.1), rgba(6,182,212,0.05)); border: 1px solid rgba(6,182,212,0.3); border-radius: var(--border-radius-md); padding: 8px; text-align: center; margin-bottom: 8px; }
    .gem-count { font-size: 18px; font-weight: 900; color: var(--gem-color); }

    .damage-effect { position: fixed; pointer-events: none; font-size: 16px; font-weight: 900; color: #fff; text-shadow: 0 0 8px var(--accent-color); z-index: 1000; animation: damageFloat 1s forwards; }
    @keyframes damageFloat { 0%{opacity:1; transform:translateY(0) scale(0.6);} 25%{transform:translateY(-20px) scale(1.2);} 100%{opacity:0; transform:translateY(-60px) scale(1);} }

    .sparkle-effect { position: fixed; pointer-events: none; z-index: 1002; width: 30px; height: 30px; animation: sparkleAnim 0.8s forwards; }
    @keyframes sparkleAnim { 0%{opacity:1; transform:scale(0);} 50%{opacity:1;} 100%{opacity:0; transform:scale(1);} }

    /* ガチャ演出コンテナ */
    #gachaEffectContainer { position: fixed; inset: 0; z-index: 3000; pointer-events: none; display: none; align-items: center; justify-content: center; }
    #gachaSvg { width: 100vw; height: 100vh; max-width: 100%; max-height: 100%; }

    @keyframes boxFall {
      0% { transform: translateY(-150px) rotate(0deg) scale(0.4); opacity: 1; }
      70% { transform: translateY(80px) rotate(360deg) scale(1); opacity: 1; }
      100% { transform: translateY(80px) rotate(400deg) scale(1); opacity: 1; }
    }

    @keyframes sparkRadiate {
      0% { opacity: 1; transform: translate(0, 0) scale(0); }
      50% { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1); }
    }

    @keyframes levelUpPop {
      0% { opacity: 0; transform: scale(0) rotate(-180deg); }
      50% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.2) rotate(180deg); }
    }

    @keyframes prestigeFlash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .drop-notice {
      position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, rgba(16,185,129,0.95), rgba(5,150,105,0.95));
      color: #fff; font-weight: 900; font-size: 10px;
      padding: 6px 10px; border-radius: var(--border-radius-md);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4); z-index: 1500;
      border: 1px solid rgba(255,255,255,0.3);
      animation: dropNoticeAnim 3s forwards;
    }
    @keyframes dropNoticeAnim {
      0% { opacity:0; transform:translateX(-50%) translateY(-10px); }
      10% { opacity:1; transform:translateX(-50%) translateY(0); }
      80% { opacity:1; transform:translateX(-50%) translateY(0); }
      100% { opacity:0; transform:translateX(-50%) translateY(-10px); }
    }

    /* 下部バナー広告 */
    .banner-ad {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100vw;
      background: rgba(0,0,0,0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .ad-mobile { display: none; width: 320px; height: 60px; overflow: hidden; }
    .ad-pc { display: none; width: 728px; height: 100px; overflow: hidden; }

    @media screen and (max-width: 600px) {
      .ad-mobile { display: flex !important; justify-content: center; align-items: center; }
      .ad-pc { display: none !important; }
      body { padding-bottom: 70px; }
      .banner-ad { height: 60px; }
      .game-container { width: 98%; }
      .header { padding: 8px 10px; }
      .player-info { font-size: 11px; }
      .resources { gap: 5px; font-size: 9px; }
      .battle-area { min-height: 160px; }
      .upgrade-grid { grid-template-columns: 1fr; }
    }

    @media screen and (min-width: 601px) {
      .ad-mobile { display: none !important; }
      .ad-pc { display: flex !important; justify-content: center; align-items: center; }
      body { padding-bottom: 110px; }
      .banner-ad { height: 100px; }
      .game-container { width: 440px; }
    }
  </style>
</head>

<body>

<div class="game-container">
  <div class="header">
    <div class="player-info">👤 <span id="playerNameDisplay">冒険者</span></div>
    <div class="resources">
      <div class="gold">💰 <span id="goldDisplay">0</span></div>
      <div class="gem">💎 <span id="gemDisplay">0</span></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('battle')">⚔️ ダンジョン</button>
    <button class="tab-btn" onclick="switchTab('enhance')">📈 強化</button>
    <button class="tab-btn" onclick="switchTab('gacha')">🎰 ガチャ</button>
  </div>

  <!-- ダンジョンタブ -->
  <div class="tab-content active" id="tab-battle">
    <div class="battle-area" onclick="attackEnemy(event)">
      <div class="stage-info">Lv.<span id="stageDisplay">1</span></div>
      <div class="prestige-info">転生 <span id="prestigeDisplay">0</span></div>
      <div style="position:relative;">
        <div class="boss-crown" id="bossCrown">👑</div>
        <div class="enemy-emoji" id="enemyEmoji">🐀</div>
      </div>
      <div class="enemy-name" id="enemyName">ダークラット</div>
      <div class="bars-container">
        <div class="bar-row">
          <div class="bar-label"><span>❤️ HP</span><span><span id="currentHp">10</span>/<span id="maxHp">10</span></span></div>
          <div class="bar-bg"><div class="hp-bar" id="hpBar" style="width:100%"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-label"><span>💧 MP</span><span><span id="currentMp">100</span>/<span id="maxMp">100</span></span></div>
          <div class="bar-bg"><div class="mp-bar" id="mpBar" style="width:100%"></div></div>
        </div>
      </div>
    </div>

    <div class="skill-grid">
      <button class="skill-btn" onclick="useSkill('burst')">⚡ 魔力<br>MP50</button>
      <button class="skill-btn" onclick="useSkill('autotap')">👆 自動<br>MP30</button>
      <button class="skill-btn" onclick="useSkill('tapboost')">💥 強化<br>MP40</button>
      <button class="skill-btn" onclick="useSkill('heal')">💧 回復<br>💎5</button>
    </div>

    <div class="party-display" id="partyDisplay"></div>

    <div class="stat-box">
      <div class="stat-label">攻撃力</div>
      <div class="stat-value"><span id="totalAtkDisplay">1</span></div>
    </div>
  </div>

  <!-- 強化タブ -->
  <div class="tab-content" id="tab-enhance">
    <div class="upgrade-grid">
      <button class="upgrade-btn" id="btnAttack" onclick="upgradeAttack()">
        <div class="btn-label">⚔️ 攻撃力</div>
        <div class="btn-cost">💰 <span id="attackCost">10</span></div>
      </button>
      <button class="upgrade-btn" id="btnHire" onclick="hireMember()">
        <div class="btn-label">👥 仲間</div>
        <div class="btn-cost">💰 <span id="hireCost">50</span></div>
      </button>
      <button class="upgrade-btn btn-ad" onclick="watchAd()">
        <div class="btn-label">📺 広告</div>
        <div class="btn-cost">FREE</div>
      </button>
      <button class="upgrade-btn btn-prestige" id="btnPrestige" onclick="prestige()" style="display:none;">
        <div class="btn-label">✨ 転生</div>
        <div class="btn-cost">Lv.10+</div>
      </button>
    </div>

    <div class="enhance-section">
      <div class="enhance-title">🗡️ 武器</div>
      <div id="weaponList" style="max-height:150px; overflow-y:auto;"></div>
    </div>

    <div class="enhance-section">
      <div class="enhance-title">🐾 ペット</div>
      <div id="petList" style="max-height:150px; overflow-y:auto;"></div>
    </div>

    <div class="enhance-section">
      <div class="enhance-title">🏰 ギルド</div>
      <div id="guildList" style="max-height:150px; overflow-y:auto;"></div>
    </div>
  </div>

  <!-- ガチャタブ -->
  <div class="tab-content" id="tab-gacha">
    <div class="gem-display">
      <div style="font-size:9px;">所持ジェム</div>
      <div class="gem-count">💎 <span id="gemGachaDisplay">0</span></div>
    </div>

    <div class="gacha-tabs">
      <button class="gacha-tab active" onclick="switchGachaTab('weapon')">🗡️ 武器</button>
      <button class="gacha-tab" onclick="switchGachaTab('hero')">🦸 仲間</button>
    </div>

    <div class="gacha-panel active" id="gacha-weapon-panel">
      <div class="gacha-buttons">
        <button class="gacha-btn gacha-single" onclick="doGacha(1)">1回<br>💎10</button>
        <button class="gacha-btn gacha-single" onclick="doGacha(3)">3回<br>💎28</button>
        <button class="gacha-btn gacha-ten" onclick="doGacha(10)">10連💎90</button>
      </div>
    </div>

    <div class="gacha-panel" id="gacha-hero-panel">
      <div class="gacha-buttons">
        <button class="gacha-btn gacha-single" onclick="doHeroGacha(1)">1回<br>💎15</button>
        <button class="gacha-btn gacha-single" onclick="doHeroGacha(3)">3回<br>💎40</button>
        <button class="gacha-btn gacha-ten" onclick="doHeroGacha(10)">10連💎130</button>
      </div>
    </div>
  </div>
</div>

<!-- ガチャ演出 -->
<div id="gachaEffectContainer">
  <svg id="gachaSvg" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
      </linearGradient>
    </defs>
    <g id="treasureBox" style="animation: boxFall 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;">
      <rect x="150" y="200" width="100" height="80" rx="8" fill="url(#goldGrad)" stroke="#d97706" stroke-width="2"/>
      <circle cx="200" cy="260" r="8" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
      <rect x="165" y="250" width="70" height="4" rx="2" fill="#f59e0b" opacity="0.6"/>
    </g>
    <g id="sparkles">
      <circle cx="200" cy="260" r="4" fill="#fbbf24" style="animation: sparkRadiate 1s ease-out forwards; --tx: 80px; --ty: -100px; animation-delay: 0.5s;"/>
      <circle cx="200" cy="260" r="3" fill="#fbbf24" style="animation: sparkRadiate 1s ease-out forwards; --tx: -80px; --ty: -80px; animation-delay: 0.55s;"/>
      <circle cx="200" cy="260" r="3.5" fill="#fbbf24" style="animation: sparkRadiate 1s ease-out forwards; --tx: 100px; --ty: 20px; animation-delay: 0.6s;"/>
      <circle cx="200" cy="260" r="2.5" fill="#fbbf24" style="animation: sparkRadiate 1s ease-out forwards; --tx: -100px; --ty: 40px; animation-delay: 0.65s;"/>
    </g>
  </svg>
</div>

<!-- 広告 -->
<div class="banner-ad">
  <div class="ad-mobile">
    <script src="https://adm.shinobi.jp/s/238e85d72e7749383cf9c35b230c7584"></script>
  </div>
  <div class="ad-pc">
    <script src="https://adm.shinobi.jp/s/264d330811e8cbfd41d7281d4c408fbf"></script>
  </div>
</div>

<script>
const HERO_IMAGES = {
  'h_maoh': 'images/character_monster_mao_02.png',
  'h_gold': 'images/character_hero_gold.png',
  'h_silver': 'images/character_hero_silver.png',
  'h_shinigami': 'images/character_monster_shinigami_02.png',
  'h_white': 'images/character_hero_white.png',
  'h_black': 'images/character_hero_black.png',
  'h_pink': 'images/character_hero_pink.png',
  'h_yellow': 'images/character_hero_yellow_man.png',
  'h_green': 'images/character_hero_green.png',
  'h_blue': 'images/character_hero_blue_man.png',
  'h_red': 'images/character_hero_red.png',
  'h_princess': 'images/character_hime_01_white_silver.png',
  'h_prince': 'images/character_oji_03_green_gold.png',
  'h_mage': 'images/character_mahotsukai_01_purple.png',
  'h_warrior': 'images/character_senshi_red.png'
};

const RARITIES = { common:{name:'コモン',symbol:'⚪',rate:0.60,baseBonus:0.15}, rare:{name:'レア',symbol:'🔵',rate:0.25,baseBonus:0.50}, sr:{name:'スーパーレア',symbol:'🟠',rate:0.12,baseBonus:2.00}, legend:{name:'レジェンド',symbol:'🌟',rate:0.03,baseBonus:8.00} };
function getWeaponNeededForNextLevel(lv) { return Math.pow(2, lv); }
const WEAPONS = { common:[{id:'w1',name:'木の剣',emoji:'🗡️'},{id:'w2',name:'革の弓',emoji:'🏹'}], rare:[{id:'w4',name:'鋼の剣',emoji:'⚔️'},{id:'w5',name:'狩人の弓',emoji:'🎯'}], sr:[{id:'w7',name:'炎の剣',emoji:'🔥'},{id:'w8',name:'エルフの弓',emoji:'✨'}], legend:[{id:'w10',name:'エクスカリバー',emoji:'🌟'},{id:'w11',name:'神弓オリオン',emoji:'💫'}] };
const WEAPON_SKILLS = [ {id:'gold_boost',name:'💰 黄金加護',desc:'ゴールド+50%'}, {id:'drop_boost',name:'🎁 幸運加護',desc:'ドロップ2倍'}, {id:'mp_regen',name:'💧 魔力の泉',desc:'MP+100%'} ];

const GACHA_HEROES = [
  {id:'h_maoh',name:'魔王',rarity:'legend',img:'h_maoh',atkBonus:0.80}, {id:'h_gold',name:'ゴールド',rarity:'legend',img:'h_gold',atkBonus:0.70}, {id:'h_silver',name:'シルバー',rarity:'legend',img:'h_silver',atkBonus:0.60},
  {id:'h_shinigami',name:'死神',rarity:'sr',img:'h_shinigami',atkBonus:0.40}, {id:'h_white',name:'ホワイト',rarity:'sr',img:'h_white',atkBonus:0.35}, {id:'h_black',name:'ブラック',rarity:'sr',img:'h_black',atkBonus:0.30},
  {id:'h_pink',name:'ピンク',rarity:'rare',img:'h_pink',atkBonus:0.20}, {id:'h_yellow',name:'イエロー',rarity:'rare',img:'h_yellow',atkBonus:0.18}, {id:'h_green',name:'グリーン',rarity:'rare',img:'h_green',atkBonus:0.16}, {id:'h_blue',name:'ブルー',rarity:'rare',img:'h_blue',atkBonus:0.15}, {id:'h_red',name:'レッド',rarity:'rare',img:'h_red',atkBonus:0.15},
  {id:'h_princess',name:'姫',rarity:'common',img:'h_princess',atkBonus:0.08}, {id:'h_prince',name:'王子',rarity:'common',img:'h_prince',atkBonus:0.08}, {id:'h_mage',name:'魔法使い',rarity:'common',img:'h_mage',atkBonus:0.09}, {id:'h_warrior',name:'戦士',rarity:'common',img:'h_warrior',atkBonus:0.10}
];
const HERO_RARITY_RATES = { common:0.50, rare:0.30, sr:0.15, legend:0.05 };

const MEMBER_TYPES = [ {name:'剣士',emoji:'🗡️',color:'#f43f5e',attackType:'slash'}, {name:'弓使い',emoji:'🏹',color:'#38bdf8',attackType:'arrow'}, {name:'魔法使い',emoji:'🔮',color:'#d946ef',attackType:'magic'} ];
const ENEMIES = { normal:[{name:'ラット',emoji:'🐀'},{name:'コウモリ',emoji:'🦇'},{name:'スライム',emoji:'🟢'},{name:'グモ',emoji:'🕷️'}], boss:[{name:'ドラゴン',emoji:'🐉'},{name:'悪魔',emoji:'😈'},{name:'死神',emoji:'💀'},{name:'魔王',emoji:'👿'}] };
const PET_DEFS = [ {id:'p1',name:'スライム',emoji:'🟢',cost:50,effect:'atk',value:0.20,desc:'攻撃+20%'}, {id:'p2',name:'コウモリ',emoji:'🦇',cost:80,effect:'gold',value:0.30,desc:'ゴールド+30%'}, {id:'p3',name:'フェニックス',emoji:'🦅',cost:150,effect:'mp_regen',value:0.50,desc:'MP+50%'} ];
const GUILD_UPGRADES = [ {id:'g1',name:'訓練場',emoji:'⚔️',cost:100,effect:'atk',value:0.10,desc:'攻撃+10%'}, {id:'g2',name:'金庫',emoji:'💰',cost:200,effect:'gold',value:0.15,desc:'ゴールド+15%'} ];

let game = { playerName:'冒険者', gold:0, gems:0, stage:1, maxStage:1, attackLevel:1, prestigeLevel:0, enemyHp:10, enemyMaxHp:10, mp:100, maxMp:100, boostTimer:0, totalKills:0, totalWeapons:0, members:[], weapons:{}, equippedWeapon:null, pets:{}, activePet:null, guild:{upgrades:{}}, gachaHeroes:{} };

function getGachaHeroBonus() { let bonus=0; Object.entries(game.gachaHeroes).forEach(([id,d])=>{ const def=GACHA_HEROES.find(h=>h.id===id); if(def) bonus+=def.atkBonus*(1+(d.level-1)*0.3); }); return bonus; }
function getActiveWeaponSkills() { if(!game.equippedWeapon||!game.weapons[game.equippedWeapon])return[]; return (game.weapons[game.equippedWeapon].skills||[]).map(sid=>WEAPON_SKILLS.find(s=>s.id===sid)).filter(Boolean); }
function hasWeaponSkill(id) { return getActiveWeaponSkills().some(s=>s.id===id); }
function getPetEffect(t) { if(!game.activePet||!game.pets[game.activePet])return 0; const p=PET_DEFS.find(x=>x.id===game.activePet); if(p&&(p.effect===t||p.effect==='all'))return p.value*(1+(game.pets[game.activePet].level-1)*0.2); return 0; }
function getGuildEffect(t) { let sum=0; Object.entries(game.guild.upgrades).forEach(([id,lv])=>{ const u=GUILD_UPGRADES.find(x=>x.id===id); if(u&&(u.effect===t||u.effect==='all'))sum+=u.value*lv; }); return sum; }
function getGoldMultiplier() { return 1.0 + (hasWeaponSkill('gold_boost')?0.5:0) + getPetEffect('gold') + getGuildEffect('gold'); }
function getDropMultiplier() { return 1.0 * (hasWeaponSkill('drop_boost')?2.0:1) + getPetEffect('drop'); }
function getMpRegenBase() { return 2 * (hasWeaponSkill('mp_regen')?2:1) * (1+getPetEffect('mp_regen')+getGuildEffect('mp')); }
function getWeaponBonus() { let b=1.0; Object.entries(game.weapons).forEach(([id,w])=>{ const base=RARITIES[w.rarity].baseBonus*(1+(w.level-1)*0.3); b+=(id===game.equippedWeapon)?base:base*0.05; }); return parseFloat(b.toFixed(3)); }
function getPetBonus() { return 1 + getPetEffect('atk') + getGuildEffect('atk') + getGachaHeroBonus(); }
function getPlayerAttack() { return Math.floor(game.attackLevel*2.0 * (1+game.prestigeLevel*0.5) * getWeaponBonus() * getPetBonus() * (game.boostTimer>0?5:1)); }
function getMemberAttack(m) { return Math.floor((m.level||1)*1.5 * (1+game.prestigeLevel*0.5) * getWeaponBonus() * getPetBonus()); }
function getHeroAttack(id, data) { const def = GACHA_HEROES.find(h => h.id === id); if(!def) return 0; const lvFactor = 1 + ((data.level||1) - 1) * 0.3; return Math.floor(def.atkBonus * 25 * lvFactor * (1 + game.prestigeLevel * 0.5) * getWeaponBonus()); }
function getTotalHeroAttack() { return Object.entries(game.gachaHeroes).reduce((s,[id,d])=>s+getHeroAttack(id,d),0); }
function getTotalMemberAttack() { return game.members.reduce((s,m)=>s+getMemberAttack(m),0); }
function getTotalAttack() { return getPlayerAttack() + getTotalMemberAttack() + getTotalHeroAttack(); }
function getAttackCost() { return Math.floor(10*Math.pow(1.3,game.attackLevel-1)); }
function getHireCost() { return Math.floor(50*Math.pow(1.5,game.members.length)); }
function getEnemyMaxHp() { const b=Math.floor(10*Math.pow(1.25,game.stage-1)); return game.stage%10===0?b*3:b; }
function getGoldReward() { return Math.floor(5*Math.pow(1.15,game.stage-1) * (1+game.prestigeLevel*0.3) * getGoldMultiplier()); }
function getDropChance() { return Math.min(0.5, 0.05*getDropMultiplier()); }

function spawnEnemy() {
  game.enemyMaxHp=getEnemyMaxHp(); game.enemyHp=game.enemyMaxHp;
  const isBoss=game.stage%10===0; const d=isBoss?ENEMIES.boss[Math.floor((game.stage/10-1)%ENEMIES.boss.length)]:ENEMIES.normal[(game.stage-1)%ENEMIES.normal.length];
  document.getElementById('enemyEmoji').textContent=d.emoji; document.getElementById('enemyName').textContent=d.name;
  document.getElementById('bossCrown').style.display=isBoss?'block':'none'; updateDisplay();
}

function attackEnemy(e) {
  dealDamage(getPlayerAttack(), e.clientX, e.clientY);
}

function dealDamage(dmg, x, y) {
  game.enemyHp-=dmg; if(x&&y){const el=document.createElement('div');el.className='damage-effect';el.textContent='-'+Math.floor(dmg);el.style.left=(x-30)+'px';el.style.top=(y-30)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
  const el=document.getElementById('enemyEmoji'); el.classList.remove('hit'); void el.offsetWidth; el.classList.add('hit');
  if(game.enemyHp<=0) killEnemy(); updateDisplay();
}

function killEnemy() {
  game.gold+=getGoldReward(); game.totalKills++; if(game.stage>game.maxStage)game.maxStage=game.stage;
  if(Math.random()<getDropChance()) { const r=rollRarity(); const w=getRandomWeapon(r); addWeapon(w.id,r); showDropNotice(w,r); }
  game.stage++;
  if(game.stage>=10) document.getElementById('btnPrestige').style.display='flex';
  setTimeout(spawnEnemy, 300);
}

function rollRarity() { let rnd=Math.random(), c=0; for(const [r,d] of Object.entries(RARITIES)){c+=d.rate;if(rnd<c)return r;} return 'common'; }
function rollHeroRarity() { let rnd=Math.random(), c=0; for(const [r,rt] of Object.entries(HERO_RARITY_RATES)){c+=rt;if(rnd<c)return r;} return 'common'; }
function getRandomWeapon(r) { return WEAPONS[r][Math.floor(Math.random()*WEAPONS[r].length)]; }
function getRandomHero(r) { const p=GACHA_HEROES.filter(h=>h.rarity===r); return p[Math.floor(Math.random()*p.length)]; }
function generateWeaponSkills(r) { if(r==='sr')return [WEAPON_SKILLS[Math.floor(Math.random()*WEAPON_SKILLS.length)].id]; if(r==='legend')return [...WEAPON_SKILLS].sort(()=>Math.random()-0.5).slice(0,2).map(s=>s.id); return []; }

function addWeapon(id, r) {
  if(!game.weapons[id]) { game.weapons[id]={rarity:r,level:1,count:1,skills:generateWeaponSkills(r)}; if(!game.equippedWeapon)game.equippedWeapon=id; }
  else { game.weapons[id].count++; tryWeaponLevelUp(id); }
  game.totalWeapons++; renderEnhance(); updateDisplay(); saveGame();
}

function tryWeaponLevelUp(id) { const w=game.weapons[id]; if(!w)return; const n=getWeaponNeededForNextLevel(w.level); if(w.count>=n){w.count-=n; w.level++; showLevelUpEffect(); tryWeaponLevelUp(id);} }

function showLevelUpEffect() {
  const el=document.createElement('div');
  el.className='sparkle-effect';
  el.textContent='⭐';
  el.style.left=(Math.random()*window.innerWidth)+'px';
  el.style.top=(Math.random()*window.innerHeight*0.5)+'px';
  el.style.fontSize='24px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

function equipWeapon(id) { game.equippedWeapon=id; renderEnhance(); updateDisplay(); saveGame(); }
function findWeaponById(id) { for(const r of Object.keys(WEAPONS)){const w=WEAPONS[r].find(x=>x.id===id);if(w)return w;} return null; }

function renderEnhance() {
  let wHtml='';
  Object.entries(game.weapons).forEach(([id,w])=>{
    const def=findWeaponById(id); if(!def)return;
    wHtml+=`<div class="enhance-row"><div class="enhance-name">${def.emoji} ${def.name} Lv.${w.level}</div><button class="enhance-action" onclick="equipWeapon('${id}')">${id===game.equippedWeapon?'装備中':'装備'}</button></div>`;
  });
  document.getElementById('weaponList').innerHTML=wHtml||'<div style="font-size:9px;color:#94a3b8;padding:6px;">武器を獲得しましょう</div>';

  let pHtml='';
  PET_DEFS.forEach(p=>{
    const own=game.pets[p.id]; const lv=own?own.level:0; const cost=own?Math.floor(p.cost*Math.pow(1.5,lv)):p.cost;
    pHtml+=`<div class="enhance-row"><div class="enhance-name">${p.emoji} ${p.name} ${own?`Lv.${lv}`:''}</div><button class="enhance-action" onclick="buyPet('${p.id}')">${own?'Lv.UP':'買う'}</button></div>`;
  });
  document.getElementById('petList').innerHTML=pHtml;

  let gHtml='';
  GUILD_UPGRADES.forEach(u=>{
    const lv=game.guild.upgrades[u.id]||0; const cost=Math.floor(u.cost*Math.pow(1.8,lv));
    gHtml+=`<div class="enhance-row"><div class="enhance-name">${u.emoji} ${u.name} Lv.${lv}</div><button class="enhance-action" onclick="upgradeGuild('${u.id}')">💰${cost}</button></div>`;
  });
  document.getElementById('guildList').innerHTML=gHtml;
}

function buyPet(id) {
  const p=PET_DEFS.find(x=>x.id===id); if(!p)return;
  if(game.pets[id]) { const c=Math.floor(p.cost*Math.pow(1.5,game.pets[id].level||1)); if(game.gems<c)return; game.gems-=c; game.pets[id].level++; }
  else { if(game.gems<p.cost)return; game.gems-=p.cost; game.pets[id]={level:1}; if(!game.activePet)game.activePet=id; }
  renderEnhance(); updateDisplay(); saveGame();
}

function upgradeGuild(id) { const u=GUILD_UPGRADES.find(x=>x.id===id); if(!u)return; const lv=game.guild.upgrades[id]||0; const c=Math.floor(u.cost*Math.pow(1.8,lv)); if(game.gold<c)return; game.gold-=c; game.guild.upgrades[id]=lv+1; renderEnhance(); updateDisplay(); saveGame(); }

function useSkill(t) {
  if(t==='burst'&&game.mp>=50){ game.mp-=50; dealDamage(getTotalAttack()*60,null,null); }
  if(t==='autotap'&&game.mp>=30){ game.mp-=30; for(let i=0;i<20;i++) setTimeout(()=>dealDamage(getPlayerAttack()*0.5,null,null), i*100); }
  if(t==='tapboost'&&game.mp>=40){ game.mp-=40; game.boostTimer=10; }
  if(t==='heal'&&game.gems>=5&&game.mp<game.maxMp){ game.gems-=5; game.mp=game.maxMp; }
  updateDisplay(); saveGame();
}

function switchGachaTab(t) { 
  document.querySelectorAll('.gacha-tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='weapon'?0:1))); 
  document.getElementById('gacha-weapon-panel').classList.toggle('active',t==='weapon'); 
  document.getElementById('gacha-hero-panel').classList.toggle('active',t==='hero'); 
}

function playGachaEffect() {
  return new Promise(resolve => {
    document.getElementById('gachaEffectContainer').style.display = 'flex';
    setTimeout(() => {
      document.getElementById('gachaEffectContainer').style.display = 'none';
      resolve();
    }, 1200);
  });
}

async function doGacha(c) { 
  const costs={1:10,3:28,10:90}; 
  if(game.gems<costs[c])return; 
  game.gems-=costs[c]; 
  
  await playGachaEffect();
  
  for(let i=0;i<c;i++){
    addWeapon(getRandomWeapon(rollRarity()).id, rollRarity());
  }
  alert('武器ガチャ完了！');
  updateDisplay();
  saveGame();
}

async function doHeroGacha(c) { 
  const costs={1:15,3:40,10:130}; 
  if(game.gems<costs[c])return; 
  game.gems-=costs[c]; 
  
  await playGachaEffect();
  
  for(let i=0;i<c;i++){ 
    const h=getRandomHero(rollHeroRarity()); 
    if(!game.gachaHeroes[h.id]) game.gachaHeroes[h.id]={level:1}; 
    else game.gachaHeroes[h.id].level++; 
  } 
  alert('仲間ガチャ完了！');
  renderParty();
  updateDisplay();
  saveGame();
}

function hireMember() { const c=getHireCost(); if(game.gold<c)return; game.gold-=c; const t=MEMBER_TYPES[Math.floor(Math.random()*MEMBER_TYPES.length)]; game.members.push({id:Date.now(),name:t.name,emoji:t.emoji,color:t.color,level:1,attackType:t.attackType}); renderParty(); updateDisplay(); saveGame(); }

function renderParty() {
  let html='';
  game.members.forEach(m=>{ html+=`<div class="member-chip" style="border-color:${m.color}88">${m.emoji} ${m.name}</div>`; });
  Object.entries(game.gachaHeroes).forEach(([id,d])=>{ 
    const def=GACHA_HEROES.find(h=>h.id===id); 
    if(def) { 
      const imgPath = HERO_IMAGES[id];
      html+=`<div class="pixel-chip"><img src="${imgPath}" alt="${def.name}" onerror="this.style.display='none'" style="width:14px;height:14px;"> ${RARITIES[def.rarity].symbol} ${def.name}</div>`; 
    }
  });
  document.getElementById('partyDisplay').innerHTML=html||'<div style="font-size:9px;color:#94a3b8;">仲間を追加してください</div>';
}

function upgradeAttack() { const c=getAttackCost(); if(game.gold<c)return; game.gold-=c; game.attackLevel++; updateDisplay(); saveGame(); }
function watchAd() { if(game.boostTimer>0)return; game.gems+=5; game.boostTimer=30; updateDisplay(); saveGame(); }

async function prestige() {
  if(!confirm('転生しますか？'))return;
  
  game.prestigeLevel++; game.gold=0; game.stage=1; game.attackLevel=1; game.members=[]; game.mp=game.maxMp; game.boostTimer=0;
  
  const count = Math.min(5, 1 + Math.floor(game.maxStage / 10));
  for(let i = 0; i < count; i++) {
    const rarity = rollRarity();
    const pool = WEAPONS[rarity];
    const w = pool[Math.floor(Math.random() * pool.length)];
    addWeapon(w.id, rarity);
    await playGachaEffect();
  }
  
  document.getElementById('btnPrestige').style.display='none'; renderParty(); spawnEnemy(); updateDisplay(); saveGame();
  alert(`✨ 転生成功！武器を ${count} 個獲得しました！`);
}

function updateDisplay() {
  document.getElementById('goldDisplay').textContent=Math.floor(game.gold); 
  document.getElementById('gemDisplay').textContent=game.gems; 
  document.getElementById('gemGachaDisplay').textContent=game.gems;
  document.getElementById('stageDisplay').textContent=game.stage; 
  document.getElementById('prestigeDisplay').textContent=game.prestigeLevel;
  document.getElementById('currentHp').textContent=Math.max(0,Math.floor(game.enemyHp)); 
  document.getElementById('maxHp').textContent=game.enemyMaxHp; 
  document.getElementById('hpBar').style.width=Math.max(0,(game.enemyHp/game.enemyMaxHp)*100)+'%';
  document.getElementById('currentMp').textContent=Math.floor(game.mp); 
  document.getElementById('mpBar').style.width=(game.mp/game.maxMp*100)+'%';
  document.getElementById('totalAtkDisplay').textContent=getTotalAttack(); 
  document.getElementById('attackCost').textContent=getAttackCost(); 
  document.getElementById('hireCost').textContent=getHireCost();
}

function showDropNotice(w,r) { 
  const el=document.createElement('div'); 
  el.className='drop-notice'; 
  el.innerHTML=`${RARITIES[r].symbol} ${w.name}`; 
  document.body.appendChild(el); 
  setTimeout(()=>el.remove(),3000); 
}

function switchTab(t) { 
  document.querySelectorAll('.tab-btn').forEach((e,i)=>e.classList.toggle('active',i===['battle','enhance','gacha'].indexOf(t))); 
  document.querySelectorAll('.tab-content').forEach((e,i)=>e.classList.toggle('active',i===['battle','enhance','gacha'].indexOf(t))); 
  if(t==='enhance')renderEnhance();
}

function saveGame() { localStorage.setItem('dungeonRPGv6', JSON.stringify(game)); }
function loadGame() { const s=localStorage.getItem('dungeonRPGv6'); if(s)try{game={...game,...JSON.parse(s)}; if(!game.gachaHeroes)game.gachaHeroes={};}catch(e){} }

let memberIdx=0;
setInterval(()=>{
  if(game.members.length===0||game.enemyHp<=0)return; 
  const m=game.members[memberIdx%game.members.length]; 
  memberIdx++; 
  const dmg=Math.floor(getMemberAttack(m)/2);
  if(dmg>0) setTimeout(()=>{if(game.enemyHp>0)dealDamage(dmg,null,null);},100); 
},800);

let heroIdx=0;
setInterval(()=>{
  const heroIds=Object.keys(game.gachaHeroes);
  if(heroIds.length===0||game.enemyHp<=0)return;
  const id=heroIds[heroIdx%heroIds.length]; heroIdx++;
  const dmg=getHeroAttack(id,game.gachaHeroes[id]);
  if(dmg>0) setTimeout(()=>{if(game.enemyHp>0)dealDamage(dmg,null,null);},150); 
},1000);

setInterval(()=>{ 
  if(game.boostTimer>0)game.boostTimer--; 
  if(game.mp<game.maxMp)game.mp=Math.min(game.maxMp,game.mp+getMpRegenBase()); 
  updateDisplay(); 
  saveGame(); 
},1000);

setInterval(saveGame,8000);

loadGame(); 
document.getElementById('playerNameDisplay').textContent=game.playerName; 
renderParty(); 
renderEnhance(); 
spawnEnemy(); 
updateDisplay();
</script>
</body>
</html>
